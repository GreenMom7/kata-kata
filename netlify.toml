[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route the app's /api/generate call to the Netlify function.
# This MUST come before the SPA fallback, or the catch-all swallows it.
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

# SPA fallback — serve index.html for any other route so client-side React works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
